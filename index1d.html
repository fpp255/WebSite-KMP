<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Company Profile</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

<div class="container">
  <header class="navbar">
    <div class="container nav-wrapper">
      
      <div class="logo">
        <img src="assets/images/logo.png" alt="Logo">
      </div>

      <nav class="nav-menu" id="nav-menu">
        <a href="#home">Home</a>
        <a href="#about">Tentang</a>
        <a href="#projects">Proyek</a>
        <a href="#contact">Kontak</a>
      </nav>

      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>
  </header>
  
  <!-- GRID 1 -->
  <div class="grid grid-2" style="margin-bottom:48px;">

    <div class="card-dark">
      <img src="https://images.unsplash.com/photo-1545558014-8692077e9b5c?w=800&q=80">
      <div class="card-body">
        <div class="card-title">Proyek Jalan Tol</div>
        <ul class="list" id="tol-projects"></ul>
      </div>
    </div>

    <div class="card-dark">
      <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=800&q=80">
      <div class="card-body">
        <div class="card-title">PIK 2 dan PIK 3 - Agung Sedayu Group</div>
        <ul class="list" id="pik-projects"></ul>
      </div>
    </div>

  </div>

  <!-- GRID 2 -->
  <div class="grid grid-2">

    <div class="card-light">
      <div class="card-title border-bottom">Proyek Lainnya</div>
      <ul class="list" id="other-projects-1"></ul>
    </div>

    <div class="card-light">
      <div class="card-title border-bottom">Proyek Lainnya</div>
      <ul class="list" id="other-projects-2"></ul>
    </div>

  </div>

</div>

<script src="assets/js/main.js"></script>
</body>
</html>
